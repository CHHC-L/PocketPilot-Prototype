<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PocketPilot — Interactive Prototype</title>
<link rel="stylesheet" href="styles.css">
<style>
  body { background:
    radial-gradient(70% 60% at 85% -5%, #e8f4ef 0%, transparent 55%),
    radial-gradient(60% 55% at 5% 105%, #e7ecfb 0%, transparent 55%),
    var(--bg);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 26px 16px 40px; gap: 22px;
  }
  .proto-bar { display: flex; align-items: center; gap: 16px; }
  .proto-bar .brand { display: flex; align-items: center; gap: 10px; }
  .proto-bar .brand .m { width: 30px; height: 30px; border-radius: 9px; background: linear-gradient(150deg, #2a9c72, var(--green)); display: grid; place-items: center; color: #fff; font-weight: 800; }
  .proto-bar .brand b { font-size: 15px; letter-spacing: -0.01em; color: var(--ink); }
  .proto-bar .brand span { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-mute); font-weight: 700; }
  .proto-bar .restart { margin-left: 8px; font-family: var(--font); font-size: 12.5px; color: var(--ink); background: #fff; border: 1px solid var(--line-2); border-radius: 999px; padding: 8px 15px; cursor: pointer; box-shadow: var(--sh-sm); font-weight: 600; }
  [data-goto], [data-fill], .tab { cursor: pointer; }
  .fade { animation: fade .28s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px) scale(.995); } to { opacity: 1; transform: none; } }
  .hint { font-size: 12px; color: var(--ink-mute); font-weight: 500; }
  .flowdots { display: flex; gap: 7px; align-items: center; }
  .flowdots i { width: 7px; height: 7px; border-radius: 50%; background: #cfd8e3; display: block; }
  .flowdots i.on { background: var(--green); box-shadow: 0 0 0 4px var(--green-soft); }
</style>
</head>
<body>
  <div class="proto-bar">
    <div class="brand"><div class="m">✦</div><b>PocketPilot</b><span>Interactive prototype</span></div>
    <button class="restart" id="restart">↺ Restart</button>
  </div>

  <div class="stage" id="stage"></div>

  <div class="flowdots" id="dots"></div>
  <div class="hint">tap buttons &amp; tabs to navigate</div>

  <script src="screens.js"></script>
  <script>
    const stage = document.getElementById('stage');
    const dotsEl = document.getElementById('dots');
    const flow = ['welcome', 'home', 'privacy', 'working', 'confirm', 'ready', 'details'];
    flow.forEach(() => { const i = document.createElement('i'); dotsEl.appendChild(i); });

    function render(id) {
      stage.innerHTML = '';
      const phone = PP.buildPhone(id);
      phone.classList.add('fade');
      stage.appendChild(phone);
      phone.querySelectorAll('[data-goto]').forEach(el => {
        el.addEventListener('click', e => { e.stopPropagation(); render(el.dataset.goto); });
      });
      const idx = flow.indexOf(id);
      [...dotsEl.children].forEach((d, k) => d.classList.toggle('on', k === idx));
    }

    document.getElementById('restart').addEventListener('click', () => render('welcome'));
    render('welcome');
  </script>
</body>
</html>
